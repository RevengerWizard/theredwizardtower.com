<div class="social-icons">
    {{ range site.Params.socialIcons }}
    <a class="social-icon" href="{{ .url }}" title="{{ .title }}" target="_blank" rel="noopener noreferrer">
        <span class="social-icon-svg" aria-hidden="true">
            {{ partial "svg.html" (dict "name" .name) }}
        </span>
    </a>
    {{ end }}
</div>
