{{ define "main" }}

<section class="section">
    <header class="section-header">
        <h1>{{ .Title }}</h1>
        {{ with .Content }}
            <div class="section-intro">{{ . }}</div>
        {{ end }}
    </header>
    <div class="tag">
    {{ range site.Taxonomies.tags.ByCount }}
        <div class="tag-wrapper">
            <a class="tag-item" href="{{ .Page.RelPermalink }}">
                <span class="post-card-tag-icon" aria-hidden="true">
                    {{ partial "svg.html" (dict "name" "hash") }}
                </span>
                <span class="tag-name">{{ .Page.Title }}</span>
            </a>
            <span class="tag-count">{{ .Count }}</span>
        </div>
    {{ else }}
        <p class="empty-state">No tags yet.</p>
    {{ end }}
    </div>
</section>

{{ end }}
