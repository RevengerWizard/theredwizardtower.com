{{ define "main" }}

<section class="section">
    <header class="section-header">
        {{ partial "breadcrumbs.html" . }}
        <h1>{{ .Title }}</h1>
    </header>
    <div class="post-feed">
    {{ range .Pages.ByDate.Reverse }}
        {{ partial "post-card.html" . }}
    {{ else }}
        <p class="empty-state">Nothing published here yet.</p>
    {{ end }}
    </div>
</section>

{{ end }}
