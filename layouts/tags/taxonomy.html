{{ define "main" }}

<section class="section-view">
    <header class="section-view__header">
        <h1>{{ .Title }}</h1>
        <p class="section-view__intro">Posts tagged with {{ .Title | lower }}.</p>
    </header>
    <div class="post-feed">
    {{ range .Pages.ByDate.Reverse }}
        {{ partial "post-card.html" . }}
    {{ else }}
        <p class="empty-state">Nothing published here yet.</p>
    {{ end }}
    </div>
</section>

{{ end }}
